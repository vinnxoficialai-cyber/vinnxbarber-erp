          var data = JSON.parse(xhr.responseText);
          var shortName = '', fullName = '', storeName = '';
          for (var i = 0; i < data.length; i++) {

          }
          var name = shortName || storeName || fullName;
          if (name) {
            var m = document.querySelector('meta[name="apple-mobile-web-app-title"]');
            if (m) m.setAttribute('content', name);
            document.title = name;
            localStorage.setItem('vinnx_pwa_short_name', name);

<body>
  <script>
    // SYNC slug detection — runs BEFORE any module loads
    // Paths like /lagoa, /romeu-duarte have pathname !== '/' and no hash
    (function() {
      var p = window.location.pathname;
      var h = window.location.hash;
      if (!h && p !== '/' && p !== '/index.html') {
        window.location.replace(window.location.origin + '/#/site');
        return; // stop execution — page is redirecting
      }
    })();
  </script>
