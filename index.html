  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#10b981" />
  <meta name="description" content="Sistema ERP completo para gestão empresarial" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VINNX" />

    href="https://enjyflztvyomrlzddavk.supabase.co/storage/v1/object/public/avatars/public/company_logo_1770648773851" />

    href="https://enjyflztvyomrlzddavk.supabase.co/storage/v1/object/public/avatars/public/company_logo_1770648773851" />
  <!-- Dynamic Theme Color System -->
  <style>
    :root {
      --primary: 0 191 98;
      --primary-50: 230 249 239;
      --primary-500: 0 191 98;
      --primary-600: 0 168 86;
      --primary-700: 0 143 73;
    }
  </style>
  <script>
    (function () {
      try {
        var s = localStorage.getItem('erp_primary_color');
        if (s) {
          var c = JSON.parse(s);
          var r = document.documentElement.style;
          if (c.DEFAULT) r.setProperty('--primary', c.DEFAULT);
          if (c['50']) r.setProperty('--primary-50', c['50']);
          if (c['500']) r.setProperty('--primary-500', c['500']);
          if (c['600']) r.setProperty('--primary-600', c['600']);
          if (c['700']) r.setProperty('--primary-700', c['700']);
        }
      } catch (e) { }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    function _wo(v) {
      return function ({ opacityValue }) {
        return opacityValue !== undefined
          ? 'rgb(' + v + ' / ' + opacityValue + ')'
          : 'rgb(' + v + ')';
      };
    }
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: _wo('var(--primary)'),
              foreground: 'hsl(var(--primary-foreground))',
              50: _wo('var(--primary-50)'),
              500: _wo('var(--primary-500)'),
              600: _wo('var(--primary-600)'),
              700: _wo('var(--primary-700)'),
            },
            dark: {
              DEFAULT: '#09090b',
              surface: '#18181b',
              border: '#27272a',
              text: '#e4e4e7'
            },
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' },
            muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* Custom scrollbar for webkit */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Dark mode scrollbar */
    .dark ::-webkit-scrollbar-thumb {
      background: #3f3f46;
    }
  </style>
