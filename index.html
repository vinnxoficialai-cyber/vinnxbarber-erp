  <script>
    // Sync PWA name BEFORE iOS captures meta tags for "Add to Home Screen"
    (function() {
      try {
        var cached = localStorage.getItem('vinnx_pwa_short_name');
        if (cached) {
          var m = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (m) m.setAttribute('content', cached);
          document.title = cached;
          return;
        }
        // First visit: fetch from Supabase synchronously (one-time ~50ms cost)
        var xhr = new XMLHttpRequest();
        xhr.open('GET',
          'https://enjyflztvyomrlzddavk.supabase.co/rest/v1/store_settings?key=in.(pwa_store_short_name,pwa_store_name,store_name)&select=key,value',
          false // synchronous
        );
        xhr.setRequestHeader('apikey', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuanlmbHp0dnlvbXJsemRkYXZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4OTE2MDksImV4cCI6MjA4NzQ2NzYwOX0.Md-ad9U6vK-OtNg3iUBX-SKCSNdOCppBasgC4ys-STc');
        xhr.send();
        if (xhr.status === 200) {
          var data = JSON.parse(xhr.responseText);
          var shortName = '', fullName = '', storeName = '';
          for (var i = 0; i < data.length; i++) {
            if (data[i].key === 'pwa_store_short_name' && data[i].value) shortName = data[i].value;
            if (data[i].key === 'pwa_store_name' && data[i].value) fullName = data[i].value;
            if (data[i].key === 'store_name' && data[i].value) storeName = data[i].value;
          }
          var name = shortName || storeName || fullName;
          if (name) {
            var m = document.querySelector('meta[name="apple-mobile-web-app-title"]');
            if (m) m.setAttribute('content', name);
            document.title = name;
            localStorage.setItem('vinnx_pwa_short_name', name);
            if (fullName) localStorage.setItem('vinnx_pwa_name', fullName);
          }
        }
      } catch(e) {}
    })();
  </script>

  <script>
    (function () {
      try {
        var s = localStorage.getItem('erp_primary_color');
        if (s) {
          var c = JSON.parse(s);
          var r = document.documentElement.style;
          if (c.DEFAULT) r.setProperty('--primary', c.DEFAULT);
          if (c['50']) r.setProperty('--primary-50', c['50']);
          if (c['500']) r.setProperty('--primary-500', c['500']);
          if (c['600']) r.setProperty('--primary-600', c['600']);
          if (c['700']) r.setProperty('--primary-700', c['700']);
        }
      } catch (e) { }
    })();
  </script>

      return function ({ opacityValue }) {
        return opacityValue !== undefined

<body>
  <script>
    // SYNC slug detection — runs BEFORE any module loads
    // Paths like /lagoa, /romeu-duarte have pathname !== '/' and no hash
    (function() {
      var p = window.location.pathname;
      var h = window.location.hash;
      if (!h && p !== '/' && p !== '/index.html') {
        window.location.replace(window.location.origin + '/#/site');
        return; // stop execution — page is redirecting
      }
    })();
  </script>

  <script type="module" src="/index.tsx"></script>
